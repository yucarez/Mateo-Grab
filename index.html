<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MateoGrab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050505;
    --surface: #0c0c0e;
    --surface2: #141417;
    --border: #222227;
    --accent: #ff6a00;
    --accent2: #ff8833;
    --text: #f5f5f7;
    --muted: #62626e;
    --mp3-clr: #ff5500;
    --mp4-clr: #ff9900;
    --radius: 12px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255, 106, 0, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 106, 0, 0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  header { margin-bottom: 40px; }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--accent);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .logo-icon svg { width: 20px; height: 20px; stroke: #050505; }

  h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  h1 span { color: var(--accent); }

  .tagline {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.02em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
  }

  .url-row { display: flex; gap: 12px; align-items: stretch; }

  .url-input-wrap { flex: 1; position: relative; }

  .url-input-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #urlInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 14px 14px 14px 48px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  #urlInput::placeholder { color: var(--muted); }
  #urlInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1); }

  .paste-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0 20px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .paste-btn:hover { border-color: var(--accent); color: var(--accent); }

  .options-row {
    display: flex;
    gap: 32px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .option-group { display: flex; flex-direction: column; gap: 10px; }

  .option-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .toggle-btns { display: flex; gap: 8px; }

  .toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 8px 20px;
    font-family: var(--font-head);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }

  .toggle-btn:hover { border-color: rgba(255, 106, 0, 0.5); color: var(--text); }
  .toggle-btn.active[data-fmt="mp3"] { background: rgba(255, 85, 0, 0.1); border-color: var(--mp3-clr); color: var(--mp3-clr); }
  .toggle-btn.active[data-fmt="mp4"] { background: rgba(255, 153, 0, 0.1); border-color: var(--mp4-clr); color: var(--mp4-clr); }
  .toggle-btn.active[data-q] { background: rgba(255, 106, 0, 0.1); border-color: var(--accent); color: var(--accent); }

  .dl-btn {
    margin-top: 28px;
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 800;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform .1s, box-shadow .2s, background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .dl-btn:hover { background: var(--accent2); box-shadow: 0 4px 20px rgba(255, 106, 0, 0.2); }
  .dl-btn:active { transform: scale(0.99); }
  .dl-btn:disabled { background: var(--surface2); color: var(--muted); transform: none; box-shadow: none; cursor: not-allowed; }

  /* Progress bar shown while downloading */
  #progressWrap {
    display: none;
    margin-top: 20px;
  }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s ease;
    animation: indeterminate 1.4s ease infinite;
  }

  @keyframes indeterminate {
    0%   { margin-left: 0%; width: 30%; }
    50%  { margin-left: 40%; width: 40%; }
    100% { margin-left: 100%; width: 0%; }
  }

  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 28px;
    border-radius: 30px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    transition: transform .25s cubic-bezier(.25, 1, .5, 1), opacity .2s;
    opacity: 0;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: var(--accent); color: var(--accent); }
  #toast.error { border-color: var(--mp3-clr); color: var(--mp3-clr); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .url-row { flex-direction: column; }
    .options-row { gap: 16px; }
    .card { padding: 24px; }
    .app { padding-top: 40px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
      <h1>Mateo<span>Grab</span></h1>
    </div>
    <p class="tagline">DOWNLOAD AUDIOS AND VIDEOS FROM YOUTUBE</p>
  </header>

  <div class="card">
    <div class="url-row">
      <div class="url-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <input id="urlInput" type="text" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false" />
      </div>
      <button class="paste-btn" onclick="pasteURL()">PASTE</button>
    </div>

    <div class="options-row">
      <div class="option-group">
        <span class="option-label">Format</span>
        <div class="toggle-btns" id="fmtBtns">
          <button class="toggle-btn active" data-fmt="mp4" onclick="setFmt('mp4')">MP4</button>
          <button class="toggle-btn" data-fmt="mp3" onclick="setFmt('mp3')">MP3</button>
        </div>
      </div>
      <div class="option-group">
        <span class="option-label" id="qualityLabel">Resolution</span>
        <div class="toggle-btns" id="qualityBtns"></div>
      </div>
    </div>

    <button class="dl-btn" id="dlBtn" onclick="startDownload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download
    </button>

    <div id="progressWrap">
      <div class="progress-label">
        <span id="progressText">Downloading…</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BACKEND_URL = "https://mateo-grab.onrender.com";

  let selectedFmt = 'mp4';
  let selectedQuality = 'best';
  const MP4_QUALITIES = ['best','1080','720','480','360'];
  const MP3_QUALITIES = ['best','320','192','128'];

  renderQualityBtns();

  function setFmt(fmt) {
    selectedFmt = fmt;
    selectedQuality = 'best';
    document.querySelectorAll('#fmtBtns .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.fmt === fmt);
    });
    renderQualityBtns();
  }

  function renderQualityBtns() {
    const qs = selectedFmt === 'mp4' ? MP4_QUALITIES : MP3_QUALITIES;
    const label = selectedFmt === 'mp4' ? 'Resolution' : 'Bitrate (kbps)';
    document.getElementById('qualityLabel').textContent = label;
    const wrap = document.getElementById('qualityBtns');
    wrap.innerHTML = '';
    qs.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn' + (q === selectedQuality ? ' active' : '');
      btn.dataset.q = q;
      btn.textContent = q === 'best' ? 'BEST' : q;
      btn.onclick = () => {
        selectedQuality = q;
        document.querySelectorAll('#qualityBtns .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.q === q));
      };
      wrap.appendChild(btn);
    });
  }

  async function pasteURL() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('urlInput').value = text.trim();
    } catch {
      toast('Paste manually (Ctrl+V)', 'error');
    }
  }

  async function startDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { toast('Enter a YouTube URL first', 'error'); return; }

    const btn = document.getElementById('dlBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressText = document.getElementById('progressText');

    btn.disabled = true;
    btn.textContent = 'Preparing…';
    progressWrap.style.display = 'block';
    progressText.textContent = 'Downloading… this may take a moment';

    try {
      const res = await fetch(BACKEND_URL + '/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, format: selectedFmt, quality: selectedQuality }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Server error');
      }

      // Get filename from Content-Disposition header
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : ('download.' + selectedFmt);

      progressText.textContent = 'Saving file…';

      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);

      document.getElementById('urlInput').value = '';
      toast('Download complete', 'success');
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download`;
      progressWrap.style.display = 'none';
    }
  }

  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });
</script>
</body>
</html>
