<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MateoGrab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #141414;
    --surface: #292929;
    --surface2: #363636;
    --border: #444444;
    --accent: #ffa31a;
    --accent2: #ffb84d;
    --text: #f5f5f7;
    --muted: #8e8e93;
    --mp3-clr: #ffa31a;
    --mp4-clr: #ffb84d;
    --radius: 4px;
    --font-head: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { 
    position: relative; 
    z-index: 1; 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 60px 24px 80px; 
  }

  header { 
    margin-bottom: 40px; 
  }

  .logo-row { 
    display: flex; 
    align-items: center; 
    gap: 14px; 
    margin-bottom: 8px; 
  }

  .logo-icon {
    width: 36px; 
    height: 36px; 
    border-radius: var(--radius);
    background: var(--accent); 
    display: grid; 
    place-items: center;
    flex-shrink: 0;
  }

  .logo-icon svg { 
    width: 18px; 
    height: 18px; 
    stroke: #292929;
  }

  h1 { 
    font-size: 2rem; 
    font-weight: 800; 
    letter-spacing: -0.02em; 
    line-height: 1; 
  }

  h1 span { 
    color: var(--accent); 
  }

  .tagline { 
    font-family: var(--font-mono); 
    font-size: 0.75rem; 
    color: var(--muted); 
    margin-top: 8px; 
    letter-spacing: 0.05em; 
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
  }

  .url-row { 
    display: flex; 
    gap: 12px; 
    align-items: stretch; 
  }

  .url-input-wrap { 
    flex: 1; 
    position: relative; 
  }

  .url-input-wrap svg { 
    position: absolute; 
    left: 16px; 
    top: 50%; 
    transform: translateY(-50%); 
    color: var(--muted); 
    pointer-events: none; 
  }

  #urlInput {
    width: 100%; 
    background: var(--surface2); 
    border: 1px solid var(--border);
    border-radius: var(--radius); 
    color: var(--text);
    font-family: var(--font-mono); 
    font-size: 0.85rem;
    padding: 14px 14px 14px 48px;
    outline: none; 
    transition: border-color .2s;
  }

  #urlInput::placeholder { 
    color: var(--muted); 
  }

  #urlInput:focus { 
    border-color: var(--accent); 
  }

  .paste-btn {
    background: var(--surface2); 
    border: 1px solid var(--border);
    color: var(--text); 
    border-radius: var(--radius); 
    padding: 0 20px;
    font-family: var(--font-mono); 
    font-size: 0.8rem; 
    font-weight: 700;
    cursor: pointer;
    transition: all .2s; 
    white-space: nowrap;
  }

  .paste-btn:hover { 
    border-color: var(--accent); 
    color: var(--accent); 
  }

  .options-row { 
    display: flex; 
    gap: 32px; 
    margin-top: 24px; 
    flex-wrap: wrap; 
  }

  .option-group { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
  }

  .option-label { 
    font-family: var(--font-mono); 
    font-size: 0.7rem; 
    color: var(--muted); 
    letter-spacing: 0.06em; 
    text-transform: uppercase; 
  }

  .toggle-btns { 
    display: flex; 
    gap: 8px; 
  }

  .toggle-btn {
    background: var(--surface2); 
    border: 1px solid var(--border);
    color: var(--muted); 
    border-radius: var(--radius); 
    padding: 8px 20px;
    font-family: var(--font-head); 
    font-size: 0.85rem; 
    font-weight: 600;
    cursor: pointer; 
    transition: all .15s;
  }

  .toggle-btn:hover { 
    border-color: var(--accent); 
    color: var(--text); 
  }

  .toggle-btn.active[data-fmt="mp3"] { 
    background: rgba(255, 163, 26, 0.1); 
    border-color: var(--mp3-clr); 
    color: var(--mp3-clr); 
  }

  .toggle-btn.active[data-fmt="mp4"] { 
    background: rgba(255, 184, 77, 0.1); 
    border-color: var(--mp4-clr); 
    color: var(--mp4-clr); 
  }

  .toggle-btn.active[data-q] { 
    background: rgba(255, 163, 26, 0.1); 
    border-color: var(--accent); 
    color: var(--accent); 
  }

  .dl-btn {
    margin-top: 28px; 
    width: 100%;
    background: var(--accent); 
    color: var(--bg);
    border: none; 
    border-radius: var(--radius);
    font-family: var(--font-head); 
    font-size: 0.95rem; 
    font-weight: 700;
    padding: 16px; 
    cursor: pointer; 
    letter-spacing: 0.02em;
    transition: background .2s;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 8px;
    text-transform: uppercase;
  }

  .dl-btn:hover { 
    background: var(--accent2);
  }

  .dl-btn:disabled { 
    background: var(--surface2); 
    color: var(--muted); 
    cursor: not-allowed; 
  }

  #jobsSection { 
    display: none; 
    margin-bottom: 24px; 
  }

  .section-title {
    font-family: var(--font-mono); 
    font-size: 0.75rem; 
    color: var(--muted);
    letter-spacing: 0.05em; 
    text-transform: uppercase; 
    margin-bottom: 12px;
  }

  .job-card {
    background: var(--surface); 
    border: 1px solid var(--border);
    border-radius: var(--radius); 
    padding: 20px; 
    margin-bottom: 12px;
  }

  .job-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 12px; 
    gap: 16px; 
  }

  .job-title { 
    font-size: 0.9rem; 
    font-weight: 600; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
    max-width: 75%; 
  }

  .job-meta { 
    display: flex; 
    gap: 10px; 
    align-items: center; 
    flex-shrink: 0; 
  }

  .job-badge {
    font-family: var(--font-mono); 
    font-size: 0.65rem; 
    font-weight: 700;
    padding: 3px 8px; 
    border-radius: var(--radius); 
    letter-spacing: 0.05em;
  }

  .badge-mp3 { 
    background: rgba(255, 163, 26, 0.15); 
    color: var(--mp3-clr); 
    border: 1px solid rgba(255, 163, 26, 0.25); 
  }

  .badge-mp4 { 
    background: rgba(255, 184, 77, 0.15); 
    color: var(--mp4-clr); 
    border: 1px solid rgba(255, 184, 77, 0.25); 
  }

  .job-speed { 
    font-family: var(--font-mono); 
    font-size: 0.7rem; 
    color: var(--muted); 
  }

  .progress-bar-wrap { 
    height: 4px; 
    background: var(--surface2); 
    border-radius: var(--radius); 
    overflow: hidden; 
  }

  .progress-bar { 
    height: 100%; 
    transition: width .3s ease; 
  }

  .progress-bar.mp3 { background: var(--mp3-clr); }
  .progress-bar.mp4 { background: var(--mp4-clr); }
  .progress-bar.done { background: var(--accent); }

  .job-status-row { 
    display: flex; 
    justify-content: space-between; 
    margin-top: 8px; 
  }

  .job-status-text { 
    font-family: var(--font-mono); 
    font-size: 0.7rem; 
    color: var(--muted); 
  }

  .job-pct { 
    font-family: var(--font-mono); 
    font-size: 0.7rem; 
    color: var(--muted); 
  }

  .job-error { 
    font-family: var(--font-mono); 
    font-size: 0.75rem; 
    color: var(--mp3-clr); 
    margin-top: 10px; 
  }

  .folder-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 20px; 
  }

  .folder-title { 
    font-size: 1rem; 
    font-weight: 700; 
  }

  .refresh-btn {
    background: none; 
    border: 1px solid var(--border); 
    color: var(--muted);
    border-radius: var(--radius); 
    padding: 6px 14px; 
    font-family: var(--font-mono);
    font-size: 0.7rem; 
    font-weight: 700;
    cursor: pointer; 
    transition: all .15s;
    display: flex; 
    align-items: center; 
    gap: 6px;
  }

  .refresh-btn:hover { 
    border-color: var(--accent); 
    color: var(--accent); 
  }

  .file-list { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
  }

  .file-item {
    display: flex; 
    align-items: center; 
    gap: 16px;
    background: var(--surface2); 
    border: 1px solid var(--border);
    border-radius: var(--radius); 
    padding: 14px 18px;
    transition: border-color .15s;
  }

  .file-item:hover { 
    border-color: var(--border); 
  }

  .file-ext {
    font-family: var(--font-mono); 
    font-size: 0.65rem; 
    font-weight: 700;
    padding: 4px 8px; 
    border-radius: var(--radius); 
    flex-shrink: 0;
  }

  .ext-MP3 { background: rgba(255, 163, 26, 0.12); color: var(--mp3-clr); border: 1px solid rgba(255, 163, 26, 0.2); }
  .ext-MP4 { background: rgba(255, 184, 77, 0.12); color: var(--mp4-clr); border: 1px solid rgba(255, 184, 77, 0.2); }
  .ext-WEBM, .ext-M4A { background: rgba(255, 163, 26, 0.1); color: var(--accent2); border: 1px solid rgba(255, 163, 26, 0.15); }

  .file-name { 
    flex: 1; 
    font-size: 0.88rem; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
  }

  .file-size { 
    font-family: var(--font-mono); 
    font-size: 0.75rem; 
    color: var(--muted); 
    flex-shrink: 0; 
  }

  .file-actions { 
    display: flex; 
    gap: 8px; 
    flex-shrink: 0; 
  }

  .icon-btn {
    background: none; 
    border: 1px solid var(--border); 
    border-radius: var(--radius);
    color: var(--muted); 
    padding: 6px 10px; 
    cursor: pointer; 
    transition: all .15s;
    display: grid; 
    place-items: center;
  }

  .icon-btn:hover.dl { border-color: var(--accent); color: var(--accent); }
  .icon-btn:hover.del { border-color: var(--mp3-clr); color: var(--mp3-clr); }

  .empty-state { 
    text-align: center; 
    padding: 48px 24px; 
    color: var(--muted); 
  }

  .empty-state svg { 
    margin-bottom: 14px; 
    opacity: .4; 
  }

  .empty-state p { 
    font-family: var(--font-mono); 
    font-size: 0.8rem; 
  }

  #toast {
    position: fixed; 
    bottom: 32px; 
    left: 50%; 
    transform: translateX(-50%) translateY(40px);
    background: var(--surface); 
    border: 1px solid var(--border);
    color: var(--text); 
    padding: 12px 28px; 
    border-radius: var(--radius);
    font-family: var(--font-mono); 
    font-size: 0.8rem;
    transition: transform .25s cubic-bezier(.25, 1, .5, 1), opacity .2s;
    opacity: 0; 
    z-index: 100; 
    white-space: nowrap;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  #toast.show { 
    transform: translateX(-50%) translateY(0); 
    opacity: 1; 
  }

  #toast.success { 
    border-color: var(--accent); 
    color: var(--accent); 
  }

  #toast.error { 
    border-color: var(--mp3-clr); 
    color: var(--mp3-clr); 
  }

  ::-webkit-scrollbar { 
    width: 6px; 
  }

  ::-webkit-scrollbar-track { 
    background: var(--bg); 
  }

  ::-webkit-scrollbar-thumb { 
    background: var(--border); 
    border-radius: var(--radius); 
  }

  @media (max-width: 600px) {
    .url-row { flex-direction: column; }
    .options-row { gap: 16px; }
    .card { padding: 24px; }
    .app { padding-top: 40px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
      <h1>Mateo<span>Grab</span></h1>
    </div>
    <p class="tagline">DOWNLOAD AUDIOS AND VIDEOS FROM YOUTUBE</p>
  </header>

  <div class="card">
    <div class="url-row">
      <div class="url-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <input id="urlInput" type="text" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false" />
      </div>
      <button class="paste-btn" onclick="pasteURL()">PASTE</button>
    </div>

    <div class="options-row">
      <div class="option-group">
        <span class="option-label">Format</span>
        <div class="toggle-btns" id="fmtBtns">
          <button class="toggle-btn active" data-fmt="mp4" onclick="setFmt('mp4')">MP4</button>
          <button class="toggle-btn" data-fmt="mp3" onclick="setFmt('mp3')">MP3</button>
        </div>
      </div>
      <div class="option-group">
        <span class="option-label" id="qualityLabel">Resolution</span>
        <div class="toggle-btns" id="qualityBtns"></div>
      </div>
    </div>

    <button class="dl-btn" id="dlBtn" onclick="startDownload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download Media
    </button>
  </div>

  <div id="jobsSection">
    <div class="section-title">Active Downloads</div>
    <div id="jobsList"></div>
  </div>

  <div class="card">
    <div class="folder-header">
      <span class="folder-title">Stored Downloads</span>
      <button class="refresh-btn" onclick="loadFiles()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        REFRESH
      </button>
    </div>
    <div id="fileList" class="file-list">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <p>No files available</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let selectedFmt = 'mp4';
  let selectedQuality = 'best';
  const activeJobs = {};
  const MP4_QUALITIES = ['best','1080','720','480','360'];
  const MP3_QUALITIES = ['best','320','192','128'];

  renderQualityBtns();
  loadFiles();

  function setFmt(fmt) {
    selectedFmt = fmt;
    selectedQuality = 'best';
    document.querySelectorAll('#fmtBtns .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.fmt === fmt);
    });
    renderQualityBtns();
  }

  function renderQualityBtns() {
    const qs = selectedFmt === 'mp4' ? MP4_QUALITIES : MP3_QUALITIES;
    const label = selectedFmt === 'mp4' ? 'Resolution' : 'Bitrate (kbps)';
    document.getElementById('qualityLabel').textContent = label;
    const wrap = document.getElementById('qualityBtns');
    wrap.innerHTML = '';
    
    qs.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn' + (q === selectedQuality ? ' active' : '');
      btn.dataset.q = q;
      btn.textContent = q === 'best' ? 'BEST' : q;
      btn.onclick = () => {
        selectedQuality = q;
        document.querySelectorAll('#qualityBtns .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.q === q));
      };
      wrap.appendChild(btn);
    });
  }

  async function pasteURL() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('urlInput').value = text.trim();
    } catch {
      toast('Paste manually (Ctrl+V)', 'error');
    }
  }

  async function startDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
      toast('Enter a YouTube URL first', 'error');
      return;
    }
    const btn = document.getElementById('dlBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Initializing…';
    
    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, format: selectedFmt, quality: selectedQuality }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      document.getElementById('urlInput').value = '';
      addJobCard(data.job_id, selectedFmt);
      pollJob(data.job_id);
      toast('Download initialized', 'success');
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Media';
    }
  }

  function addJobCard(jid, fmt) {
    document.getElementById('jobsSection').style.display = 'block';
    const card = document.createElement('div');
    card.className = 'job-card';
    card.id = 'job-' + jid;
    card.innerHTML = `
      <div class="job-top">
        <span class="job-title" id="jt-${jid}">Resolving metadata…</span>
        <div class="job-meta">
          <span class="job-badge badge-${fmt}">${fmt.toUpperCase()}</span>
          <span class="job-speed" id="js-${jid}"></span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar ${fmt}" id="jp-' + jid + '" style="width:0%"></div>
      </div>
      <div class="job-status-row">
        <span class="job-status-text" id="jss-${jid}">Queued</span>
        <span class="job-pct" id="jpct-${jid}">0%</span>
      </div>
      <div class="job-error" id="je-${jid}" style="display:none"></div>
    `;
    document.getElementById('jobsList').prepend(card);
    activeJobs[jid] = { fmt };
  }

  function updateJobCard(jid, data) {
    const pct = data.progress || 0;
    const bar = document.getElementById('jp-' + jid);
    const title = document.getElementById('jt-' + jid);
    const speed = document.getElementById('js-' + jid);
    const statusEl = document.getElementById('jss-' + jid);
    const pctEl = document.getElementById('jpct-' + jid);
    const errEl = document.getElementById('je-' + jid);
    
    if (!bar) return;
    if (data.title) title.textContent = data.title;
    
    bar.style.width = pct + '%';
    pctEl.textContent = pct + '%';
    speed.textContent = data.speed || '';
    
    const statusMap = {
      queued: 'Queued',
      downloading: 'Downloading…',
      processing: 'Processing…',
      done: 'Complete',
      error: 'Error'
    };
    
    statusEl.textContent = statusMap[data.status] || data.status;
    
    if (data.status === 'done') {
      bar.classList.add('done');
      setTimeout(() => removeJobCard(jid), 3000);
      loadFiles();
    } else if (data.status === 'error') {
      errEl.style.display = 'block';
      errEl.textContent = ' ' + (data.error || 'Execution context error');
      setTimeout(() => removeJobCard(jid), 6000);
    }
  }

  function removeJobCard(jid) {
    const card = document.getElementById('job-' + jid);
    if (card) card.remove();
    delete activeJobs[jid];
    if (Object.keys(activeJobs).length === 0) document.getElementById('jobsSection').style.display = 'none';
  }

  function pollJob(jid) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch('/api/status/' + jid);
        const data = await res.json();
        updateJobCard(jid, data);
        if (data.status === 'done' || data.status === 'error') clearInterval(interval);
      } catch {
        clearInterval(interval);
      }
    }, 600);
  }

  async function loadFiles() {
    try {
      const res = await fetch('/api/files');
      const files = await res.json();
      renderFiles(files);
    } catch (e) {
      console.error('File synchronization fault:', e);
    }
  }

  function renderFiles(files) {
    const list = document.getElementById('fileList');
    if (!files.length) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <p>No files available</p>
        </div>`;
      return;
    }
    
    list.innerHTML = files.map(f => `
      <div class="file-item">
        <span class="file-ext ext-${f.ext}">${f.ext}</span>
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-size">${f.size_str}</span>
        <div class="file-actions">
          <button class="icon-btn dl" title="Download" onclick="downloadFile('${escHtml(f.name)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button class="icon-btn del" title="Delete" onclick="deleteFile('${escHtml(f.name)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function downloadFile(name) {
    const a = document.createElement('a');
    a.href = '/api/files/' + encodeURIComponent(name);
    a.download = name;
    a.click();
  }

  async function deleteFile(name) {
    if (!confirm(`Delete verification required for: "${name}"`)) return;
    try {
      await fetch('/api/files/' + encodeURIComponent(name), { method: 'DELETE' });
      toast('File removed', 'success');
      loadFiles();
    } catch {
      toast('Removal process failed', 'error');
    }
  }

  function escHtml(s) {
    return s.replace(/"/g, '&quot;');
  }

  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });
</script>
</body>
</html>
